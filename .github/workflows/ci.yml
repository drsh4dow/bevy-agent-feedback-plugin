name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold libx11-dev libwayland-dev libasound2-dev libudev-dev pkg-config
      - run: rustup component add rustfmt clippy rustc-codegen-cranelift
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ false }}
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: cargo check --examples
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node --experimental-strip-types --test tests/test_typescript_client_helpers.ts
      - run: scripts/check-skill-bundle.sh

  rendered:
    name: rendered
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ false }}
      # Keep package details in docs/ci-linux.md.
      - name: Install Linux display dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold xvfb mesa-vulkan-drivers libx11-dev libxkbcommon-x11-0 libwayland-dev libasound2-dev libudev-dev pkg-config python3-pil
      - run: rustup component add rustfmt clippy rustc-codegen-cranelift
      - name: Verify rendered agent feedback
        env:
          RUST_BACKTRACE: "1"
          WGPU_BACKEND: vulkan
        run: env -u WAYLAND_DISPLAY xvfb-run -a -s '-screen 0 1280x720x24' scripts/verify-rendered-agent-feedback.sh
      - name: Upload agent feedback artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: agent-feedback-artifacts
          path: target/agent-feedback
          if-no-files-found: ignore
